spring:
  application:
    name: server-c
  rabbitmq:
    host: localhost
    port: 5672
    username: promotion
    password: promotion
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 50
        concurrency: 2
        max-concurrency: 8
  datasource:
    url: jdbc:mysql://localhost:3306/server_c_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health

promotion:
  rabbitmq:
    issue-processed:
      exchange: issue.processed.exchange
      queue: issue.processed.queue
      routing-key: issue.processed
      retry-exchange: issue.processed.retry.exchange
      retry-queue: issue.processed.retry.wait.queue
      retry-routing-key: issue.processed.retry
      retry-delay-millis: 5000
      max-retry-count: 3
      dead-letter-exchange: issue.processed.dlx
      dead-letter-queue: issue.processed.dlq
      dead-letter-routing-key: issue.processed.dlq
