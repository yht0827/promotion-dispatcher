spring:
  application:
    name: server-c
  rabbitmq:
    host: localhost
    port: 5672
    username: promotion
    password: promotion
  datasource:
    url: jdbc:mysql://localhost:3306/server_c_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health

promotion:
  rabbitmq:
    issue-processed:
      exchange: issue.processed.exchange
      queue: issue.processed.queue
      routing-key: issue.processed
      dead-letter-exchange: issue.processed.dlx
      dead-letter-queue: issue.processed.dlq
      dead-letter-routing-key: issue.processed.dlq
