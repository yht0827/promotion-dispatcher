name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
      redis:
        image: redis:7.4
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3.13-management
        env:
          RABBITMQ_DEFAULT_USER: promotion
          RABBITMQ_DEFAULT_PASS: promotion
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Wait for infrastructure
        run: |
          wait_for() {
            name="$1"
            shift

            for i in $(seq 1 60); do
              if "$@"; then
                echo "${name} is ready"
                return 0
              fi

              sleep 2
            done

            echo "${name} is not ready"
            return 1
          }

          wait_for mysql docker exec "${{ job.services.mysql.id }}" mysqladmin ping -uroot -ppassword --silent
          wait_for redis docker exec "${{ job.services.redis.id }}" redis-cli ping
          wait_for rabbitmq docker exec "${{ job.services.rabbitmq.id }}" rabbitmq-diagnostics -q ping

      - name: Prepare MySQL databases
        run: |
          docker exec "${{ job.services.mysql.id }}" mysql -uroot -ppassword -e "
          CREATE DATABASE IF NOT EXISTS server_a_db
            DEFAULT CHARACTER SET utf8mb4
            DEFAULT COLLATE utf8mb4_0900_ai_ci;
          CREATE DATABASE IF NOT EXISTS server_c_db
            DEFAULT CHARACTER SET utf8mb4
            DEFAULT COLLATE utf8mb4_0900_ai_ci;
          "

      - name: Run tests
        run: ./gradlew test --no-daemon
